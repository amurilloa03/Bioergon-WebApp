<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Bioergon - Plataforma para crear y gestionar formularios interactivos" />
  <meta name="csrf-token" content="{{ csrf_token() }}" />
  <title>{% block title %}Bioergon - Formularios{% endblock %}</title>
  <link rel="stylesheet" href="{{url_for('static', filename='css/styles.css')}}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}" />
</head>

<body>
  <header>{% block header %}{% include "header.html" %}{% endblock %}</header>

  <main class="main-content">
    {% block content %}
    <!-- Contenido específico de cada página -->
    {% endblock %}
  </main>

  <footer>{% block footer %}{% include "footer.html" %}{% endblock %}</footer>
  {% block scripts %}{% endblock %}
</body>

</html>
