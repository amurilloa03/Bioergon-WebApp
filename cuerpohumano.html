<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuerpo Humano Interactivo con Hover</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
        }

        h2 { color: #333; }

        /* Estilos para el contenedor del SVG */
        #contenedor-svg {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        #cuerpo-humano {
            width: 300px;
            height: auto;
        }

        /* ============================================================
           ¡AQUÍ ESTÁ LA MAGIA DEL COLOR!
        ============================================================ */

        /* 1. ESTADO NORMAL */
        /* Todas las etiquetas SVG que tengan esta clase tendrán este estilo */
        .parte-interactiva {
            fill: #a8dadc;  /* Color de RELLENO base (un azul grisáceo) */
            stroke: #457b9d; /* Color del BORDE */
            stroke-width: 2;
            cursor: pointer; /* Cambia el cursor a una manita */
            
            /* Esta línea suaviza el cambio de color para que no sea brusco */
            transition: fill 0.3s ease, transform 0.1s ease;
        }

        /* 2. ESTADO HOVER (Cuando el mouse pasa por encima) */
        /* La pseudo-clase :hover se activa solo cuando el cursor está sobre el elemento */
        .parte-interactiva:hover {
            fill: #e63946; /* ¡BUM! Cambio de color a rojo intenso */
            
            /* Opcional: Un pequeño efecto de escala para que "salte" */
             transform: scale(1.02); 
        }
        
        /* ============================================================ */


        /* Área donde se muestra el resultado al hacer clic */
        #resultado-seleccion {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            background-color: #1d3557;
            color: white;
            font-weight: bold;
            min-width: 200px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Pasa el mouse y haz clic</h2>

    <div id="contenedor-svg">
        <svg id="cuerpo-humano" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
            
            <path class="parte-interactiva" 
                  id="cabeza" data-nombre="Cabeza"
                  d="M100,20 C83,20 70,33 70,50 C70,67 83,80 100,80 C117,80 130,67 130,50 C130,33 117,20 100,20 Z" />
            
            <path class="parte-interactiva" 
                  id="torso" data-nombre="Pecho / Torso"
                  d="M70,85 L130,85 C135,85 140,90 138,110 L130,180 C128,190 72,190 70,180 L62,110 C60,90 65,85 70,85 Z" />

            <path class="parte-interactiva" 
                  id="hombro-izq" data-nombre="Hombro Izquierdo"
                  d="M70,85 C60,85 50,90 45,100 C40,110 42,120 50,125 C60,130 70,115 70,105 L70,85 Z" />

            <path class="parte-interactiva" 
                  id="hombro-der" data-nombre="Hombro Derecho"
                  d="M130,85 C140,85 150,90 155,100 C160,110 158,120 150,125 C140,130 130,115 130,105 L130,85 Z" />
            
             <path class="parte-interactiva" 
                  id="brazo-izq" data-nombre="Brazo Izquierdo"
                  d="M45,125 C45,125 35,180 40,200 L60,200 C65,180 55,125 55,125 Z" />
                  
             <path class="parte-interactiva" 
                  id="brazo-der" data-nombre="Brazo Derecho"
                  d="M155,125 C155,125 165,180 160,200 L140,200 C135,180 145,125 145,125 Z" />

        </svg>
    </div>

    <div id="resultado-seleccion">Selecciona una zona</div>


    <script>
        // JavaScript solo para detectar el CLIC y mostrar el nombre.
        // El efecto de hover NO necesita este script.
        const partesDelCuerpo = document.querySelectorAll('.parte-interactiva');
        const displayResultado = document.getElementById('resultado-seleccion');

        partesDelCuerpo.forEach(parte => {
            parte.addEventListener('click', function() {
                // Resaltar visualmente la selección (opcional)
                partesDelCuerpo.forEach(p => p.style.fill = ""); // Resetear otros
                this.style.fill = "#1d3557"; // Color oscuro fijo al hacer clic

                const nombreDeLaParte = this.getAttribute('data-nombre');
                displayResultado.textContent = nombreDeLaParte;
            });
        });
    </script>

</body>
</html>
